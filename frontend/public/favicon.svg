<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1a1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1e22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>
  
  <!-- Corner ticks (top-left) -->
  <path d="M 15 25 L 15 15 L 25 15" stroke="#2d8fa3" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Corner ticks (top-right) -->
  <path d="M 75 15 L 85 15 L 85 25" stroke="#2d8fa3" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Corner ticks (bottom-left) -->
  <path d="M 25 85 L 15 85 L 15 75" stroke="#2d8fa3" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Corner ticks (bottom-right) -->
  <path d="M 85 75 L 85 85 L 75 85" stroke="#2d8fa3" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Outer eye shape -->
  <ellipse cx="50" cy="50" rx="32" ry="20" fill="none" stroke="#2d8fa3" stroke-width="2.5"/>
  
  <!-- Middle eye shape -->
  <ellipse cx="50" cy="50" rx="22" ry="14" fill="none" stroke="#2d8fa3" stroke-width="2"/>
  
  <!-- Inner iris -->
  <circle cx="50" cy="50" r="10" fill="#2d8fa3" opacity="0.3"/>
  
  <!-- Pupil with gold accent -->
  <circle cx="50" cy="50" r="6" fill="#c9956a"/>
  
  <!-- Highlight -->
  <circle cx="48" cy="47" r="2" fill="#ffffff" opacity="0.8"/>
</svg>
